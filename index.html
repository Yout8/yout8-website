<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yout8 - Verificação de Segurança</title>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --accent-blue: #2b5797;
            --secondary-blue: #f0f5f9;
        }

        [data-theme="dark"] {
            --bg-color: #000000;
            --text-color: #e0e0e0;
            --accent-blue: #4a9eff;
            --secondary-blue: #1a1a1a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background 0.3s ease;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: var(--secondary-blue);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }

        h2 {
            margin-bottom: 20px;
            color: var(--accent-blue);
        }

        p {
            margin-bottom: 30px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .captcha-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        #status-message {
            margin-top: 15px;
            font-weight: 500;
            color: var(--accent-blue);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Verificação</h2>
    <p>Para garantir a segurança do download do <strong>Yout8</strong>, por favor resolva o desafio abaixo.</p>

    <div class="captcha-wrapper">
        <div class="g-recaptcha" 
             data-sitekey="6LfT1q0sAAAAAOow8qAm0bwhBBdehYJWkgoKm2_O" 
             data-callback="onSuccess"
             data-theme="light">
        </div>
    </div>

    <div id="status-message">Aguardando validação...</div>
</div>

<script>
    // Função chamada automaticamente quando o reCAPTCHA é resolvido com sucesso
    function onSuccess(token) {
        if (token) {
            document.getElementById('status-message').innerText = "Sucesso. Redirecionando...";
            
            // Pequeno atraso para o usuário ver a confirmação antes de mudar de página
            setTimeout(() => {
                window.location.href = "pages/central.html";
            }, 1000);
        }
    }

    // Detecta o tema do sistema ou pode ser adaptado para o seu seletor
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
    }
</script>

</body>
</html>
